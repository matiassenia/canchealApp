<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cancha de futbol nocturna</title>
  <desc id="desc">Ilustracion original de una cancha de futbol con cesped y luces.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#06120c"/>
      <stop offset="0.55" stop-color="#0b2416"/>
      <stop offset="1" stop-color="#12351f"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#14532d"/>
      <stop offset="0.5" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="0%" r="65%">
      <stop offset="0" stop-color="#ecfccb" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ecfccb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stripes" width="180" height="900" patternUnits="userSpaceOnUse">
      <rect width="90" height="900" fill="#15803d" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="270" cy="72" r="210" fill="url(#light)"/>
  <circle cx="1330" cy="72" r="210" fill="url(#light)"/>
  <path d="M0 350 C310 285 1220 285 1600 350 L1600 900 L0 900 Z" fill="url(#grass)"/>
  <path d="M0 350 C310 285 1220 285 1600 350 L1600 900 L0 900 Z" fill="url(#stripes)" opacity="0.75"/>
  <path d="M115 820 L1485 820 L1265 432 L335 432 Z" fill="none" stroke="#dcfce7" stroke-width="8" opacity="0.9"/>
  <path d="M800 432 L800 820" stroke="#dcfce7" stroke-width="8" opacity="0.8"/>
  <circle cx="800" cy="626" r="118" fill="none" stroke="#dcfce7" stroke-width="8" opacity="0.8"/>
  <path d="M335 432 L460 544 L460 708 L115 820" fill="none" stroke="#dcfce7" stroke-width="8" opacity="0.75"/>
  <path d="M1265 432 L1140 544 L1140 708 L1485 820" fill="none" stroke="#dcfce7" stroke-width="8" opacity="0.75"/>
  <path d="M145 270 L145 520" stroke="#bbf7d0" stroke-width="10" opacity="0.55"/>
  <path d="M1455 270 L1455 520" stroke="#bbf7d0" stroke-width="10" opacity="0.55"/>
  <circle cx="800" cy="626" r="12" fill="#f7fee7"/>
  <rect width="1600" height="900" fill="#020617" opacity="0.18"/>
